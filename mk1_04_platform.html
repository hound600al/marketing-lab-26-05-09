<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>mk1 플랫폼별</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Segoe UI',sans-serif;background:#fff;padding:22px 24px}
h2{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px}
h2 span{font-size:12px;color:#888;font-weight:400;margin-left:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.col h3{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;text-align:center}
</style>
</head>
<body>
<h2>플랫폼별 성과 비중 <span>비용(KRW) · 구매 건수</span></h2>
<div class="row">
  <div class="col"><h3>비용 비중</h3><canvas id="c1" height="260"></canvas></div>
  <div class="col"><h3>구매 건수 비중</h3><canvas id="c2" height="260"></canvas></div>
</div>
<script>
const fmt=n=>n.toLocaleString('ko-KR');
const platforms=['AOS Web2App','AOS','iOS Web2App','iOS','B2B'];
const costs=[8891619,14773761,4090778,21144296,2024333];
const purchases=[2455,1195,1304,397,0];
const colors=['#0f3460','#e94560','#0f9b8e','#f5a623','#7c3aed'];
const opt=(label,unit)=>({
  plugins:{
    legend:{position:'bottom',labels:{font:{size:11},padding:12}},
    tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${unit==='₩'?'₩':''} ${fmt(ctx.raw)}${unit==='건'?' 건':''}`}}
  },
  maintainAspectRatio:false,
});
new Chart(document.getElementById('c1'),{type:'doughnut',data:{labels:platforms,datasets:[{data:costs,backgroundColor:colors,hoverOffset:8}]},options:opt('비용','₩')});
new Chart(document.getElementById('c2'),{type:'doughnut',data:{labels:platforms,datasets:[{data:purchases,backgroundColor:colors,hoverOffset:8}]},options:opt('구매','건')});
</script>
</body>
</html>
