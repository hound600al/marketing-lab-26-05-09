// ─── 헬퍼 ───────────────────────────────────────────
function fmt(n) { return n.toLocaleString('ko-KR'); }
function extractLabel(name) {
  // 소재명(한글 괄호 포함) 추출
  const m = name.match(/vd[_\/][a-z0-9]*[_]?([가-힣\s\/\(\)%a-zA-Z0-9]+)(?:_(?:mk1|sj1|hn1|cr1|nk1|dh1|pa))/i);
  if (m) return m[1].trim().replace(/^(pa|ca|cr|dcj)_/i,'');
  const m2 = name.match(/([가-힣\s\/\(\)%]+)/);
  return m2 ? m2[0].trim().slice(0,20) : name.slice(0,20);
}
function getPlatform(name) {
  if (name.startsWith('b2b')) return 'B2B';
  if (name.startsWith('ios(Web2App)')) return 'iOS Web2App';
  if (name.startsWith('ios')) return 'iOS';
  if (name.startsWith('aos(Web2App)')) return 'AOS Web2App';
  return 'AOS';
}
function getMonth(name) {
  const m = name.match(/_26\.0(\d)\.\d+/);
  if (m) return `26.0${m[1]}`;
  const m2 = name.match(/_25\.(\d{2})\.\d+/);
  if (m2) return `25.${m2[1]}`;
  return '기타';
}
function getCategory(name) {
  if (name.includes('대형폐기물') || name.includes('대형페기물')) return '대형폐기물';
  if (name.includes('음식물')) return '음식물';
  if (name.includes('폐기물')) return '일반폐기물';
  if (name.includes('복합') || name.includes('복합소구')) return '복합소구';
  if (name.includes('인플루언서')) return '인플루언서PA';
  if (name.includes('방문수거')) return '방문수거(B2B)';
  return '기타';
}

`;

  }
});

// ─── 월별 추이 ────────────────────────────────────────
const months = ['25.01','26.01','26.02','26.03','26.04','26.05'];
const monthLabels = ['25.01','26.01','26.02','26.03','26.04','26.05'];
const mCost = Object.fromEntries(months.map(m=>[m,0]));
const mPur  = Object.fromEntries(months.map(m=>[m,0]));
raw.forEach(r => {
  const mo = getMonth(r[0]);
  if (mCost[mo]!==undefined) { mCost[mo]+=r[3]; mPur[mo]+=r[4]; }
});
new Chart(document.getElementById('monthlyChart'), {
  type: 'bar',
  data: {
    labels: monthLabels,
    datasets: [
      { type: 'bar', label: '비용 (KRW)', data: monthLabels.map(m=>mCost[m]), backgroundColor: 'rgba(15,52,96,0.75)', yAxisID: 'y', borderRadius: 6 },
      { type: 'line', label: '구매 건수', data: monthLabels.map(m=>mPur[m]), borderColor: '#e94560', backgroundColor: 'rgba(233,69,96,.15)', pointRadius: 6, pointBackgroundColor: '#e94560', yAxisID: 'y1', tension: 0.35, fill: true }
    ]
  },
  options: {
    plugins: {
      legend: { labels: { font: { size: 12 } } },
      tooltip: { callbacks: {
        label: ctx => ctx.datasetIndex===0 ? `비용: ₩${fmt(ctx.raw)}` : `구매: ${fmt(ctx.raw)}건`
      }}
    },
    scales: {
      y:  { position: 'left',  grid: { color: '#f0f0f0' }, ticks: { callback: v=>'₩'+fmt(v), font:{size:11} }, title: { display: true, text: '비용 (KRW)' } },
      y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font:{size:11} }, title: { display: true, text: '구매 건수' } }
    },
    maintainAspectRatio: false,
  }
});

// ─── 카테고리별 ───────────────────────────────────────
const cats = ['대형폐기물','음식물','일반폐기물','복합소구','인플루언서PA','방문수거(B2B)','기타'];
const catCost = Object.fromEntries(cats.map(c=>[c,0]));
const catPur  = Object.fromEntries(cats.map(c=>[c,0]));
raw.forEach(r => {
  const c = getCategory(r[0]);
  catCost[c]=(catCost[c]||0)+r[3];
  catPur[c] =(catPur[c]||0)+r[4];
});
new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: cats,
    datasets: [
      { label: '비용 (KRW)', data: cats.map(c=>catCost[c]), backgroundColor: 'rgba(15,52,96,0.8)', borderRadius: 6, yAxisID: 'y' },
      { label: '구매 건수', data: cats.map(c=>catPur[c]),  backgroundColor: 'rgba(233,69,96,0.8)', borderRadius: 6, yAxisID: 'y1' },
    ]
  },
  options: {
    plugins: {
      legend: { labels: { font: { size: 12 } } },
      tooltip: { callbacks: {
        label: ctx => ctx.datasetIndex===0 ? `비용: ₩${fmt(ctx.raw)}` : `구매: ${fmt(ctx.raw)}건`
      }}
    },
    scales: {
      y:  { position: 'left',  grid: { color: '#f0f0f0' }, ticks: { callback: v=>'₩'+fmt(v), font:{size:11} } },
      y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font:{size:11} } }
    },
    maintainAspectRatio: false,
  }
});
</script>
</body>
</html>
