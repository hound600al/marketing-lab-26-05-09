<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>mk1 카테고리별</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Segoe UI',sans-serif;background:#fff;padding:22px 24px}
h2{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px}
h2 span{font-size:12px;color:#888;font-weight:400;margin-left:8px}
</style>
</head>
<body>
<h2>소재 카테고리별 성과 비교 <span>비용(KRW) · 구매 건수</span></h2>
<canvas id="c" height="300"></canvas>
<script>
const fmt=n=>n.toLocaleString('ko-KR');
const cats=['대형폐기물','음식물','일반폐기물','복합소구','인플루언서PA','방문수거(B2B)'];
const costs=[19021869,10381199,4817090,1140325,4358074,2024333];
const purchases=[2506,1134,462,20,376,0];
new Chart(document.getElementById('c'),{
  type:'bar',
  data:{
    labels:cats,
    datasets:[
      {label:'비용 (KRW)',data:costs,backgroundColor:'rgba(15,52,96,0.8)',borderRadius:6,yAxisID:'y'},
      {label:'구매 건수',data:purchases,backgroundColor:'rgba(233,69,96,0.8)',borderRadius:6,yAxisID:'y1'},
    ]
  },
  options:{
    plugins:{
      legend:{labels:{font:{size:12}}},
      tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?`비용: ₩${fmt(ctx.raw)}`:`구매: ${fmt(ctx.raw)}건`}}
    },
    scales:{
      y:{position:'left',grid:{color:'#f0f0f0'},ticks:{callback:v=>'₩'+fmt(v),font:{size:11}},title:{display:true,text:'비용 (KRW)'}},
      y1:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:11}},title:{display:true,text:'구매 건수'}}
    },
    maintainAspectRatio:false,
  }
});
</script>
</body>
</html>
