<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2-1-2단계 — CRM 자동화 효과</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f8f9fa; margin: 0; padding: 24px; }
  h2 { color: #1a1a2e; font-size: 18px; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top: 0; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; max-width: 960px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card.full { grid-column: 1 / -1; }
  .card h3 { font-size: 14px; color: #555; margin: 0 0 16px; }
  .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; margin-top: 10px; }
  .highlight { background: #fff8e1; border-radius: 10px; padding: 16px 20px; text-align: center; margin-top: 16px; }
  .highlight .num { font-size: 32px; font-weight: 900; color: #e65100; }
  .highlight .label { font-size: 13px; color: #666; margin-top: 4px; }
  canvas { max-height: 200px; }
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto">
  <h2>📬 2-1-2단계 — CRM 재구매 자동화: D22·D29·D61 시나리오 효과</h2>
  <p class="sub">비교 기간: 도입 전(2024-05~08) vs 도입 후(2024-08~11)</p>
  <div class="grid">
    <div class="card">
      <h3>📲 D22 앱 푸시 — 재주문율</h3>
      <canvas id="d22Chart"></canvas>
      <div class="badge">+3.07%p (+24%)</div>
    </div>
    <div class="card">
      <h3>💌 D29 알림톡 쿠폰 — 재활성화율</h3>
      <canvas id="d29Chart"></canvas>
      <div class="badge">+7.20%p (+31%)</div>
    </div>
    <div class="card">
      <h3>💌 D61 알림톡 쿠폰 — 재활성화율</h3>
      <canvas id="d61Chart"></canvas>
      <div class="badge">+4.81%p (+47%)</div>
    </div>
    <div class="card full">
      <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <div class="highlight" style="flex:1;min-width:200px">
          <div class="num">7,997명</div>
          <div class="label">재활성화된 총 고객 수</div>
        </div>
        <div class="highlight" style="flex:1;min-width:200px">
          <div class="num">7.3건</div>
          <div class="label">1인당 90일 추가 주문 수</div>
        </div>
        <div class="highlight" style="flex:1;min-width:200px">
          <div class="num" style="color:#2e7d32">추가 매출 회수</div>
          <div class="label">90일 LTV 기반 재활성화 성과(예측)</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const makeHorizBar = (id, labels, before, after, suffix) => new Chart(document.getElementById(id), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      { label: '도입 전', data: before, backgroundColor: '#ef535066', borderColor: '#ef5350', borderWidth: 2, borderRadius: 6 },
      { label: '도입 후', data: after, backgroundColor: '#4CAF5066', borderColor: '#4CAF50', borderWidth: 2, borderRadius: 6 }
    ]
  },
  options: { indexAxis: 'y', plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
    scales: { x: { ticks: { callback: v => v+suffix } } } }
});
makeHorizBar('d22Chart', ['재주문율'], [12.70], [15.77], '%');
makeHorizBar('d29Chart', ['재활성화율'], [23.57], [30.77], '%');
makeHorizBar('d61Chart', ['재활성화율'], [10.32], [15.13], '%');
</script>
</body>
</html>
