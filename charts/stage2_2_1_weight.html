<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2-2-1단계 — 배출량 정책: 무게 분포 변화</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f8f9fa; margin: 0; padding: 24px; }
  h2 { color: #1a1a2e; font-size: 18px; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top: 0; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card h3 { font-size: 14px; color: #555; margin: 0 0 16px; }
  .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; margin-top: 10px; }
  .kpi-row { display: flex; gap: 12px; flex-direction: column; }
  .kpi { background: #fff8e1; border-radius: 10px; padding: 14px; text-align: center; }
  .kpi .num { font-size: 22px; font-weight: 900; color: #e65100; }
  .kpi .label { font-size: 12px; color: #666; margin-top: 4px; }
  canvas { max-height: 260px; }
</style>
</head>
<body>
<div style="max-width:900px;margin:0 auto">
  <h2>⚖️ 2-2-1단계 — 8kg 초과 배출 인센티브: 무게 분포 변화 & 객단가 +17.6%</h2>
  <p class="sub">도입: 2024-10-16 | 비교: 도입 전 6개월 vs 도입 후 5개월</p>
  <div class="grid">
    <div class="card">
      <h3>📦 수거 무게 분포 변화 — 도입 전/후</h3>
      <canvas id="weightChart"></canvas>
      <div class="badge">8kg 초과 비율: 20.75% → 27.07% (+6.32%p)</div>
    </div>
    <div class="card">
      <div class="kpi-row">
        <div class="kpi" style="background:#e8f5e9">
          <div class="num" style="color:#2e7d32">+17.6%</div>
          <div class="label">객단가 상승률</div>
        </div>
        <div class="kpi" style="background:#e3f2fd">
          <div class="num" style="color:#1565c0">+2.3%</div>
          <div class="label">ARPU 상승률</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
new Chart(document.getElementById('weightChart'), {
  type: 'bar',
  data: {
    labels: ['2kg미만','2~4kg','4~6kg','6~8kg','8~12kg','12~16kg','16kg이상'],
    datasets: [
      { label: '도입 전(%)', data: [15.23,30.55,21.21,12.25,11.87,4.22,4.66],
        backgroundColor: '#ef535066', borderColor: '#ef5350', borderWidth: 2, borderRadius: 4 },
      { label: '도입 후(%)', data: [11.75,27.15,21.14,12.91,14.02,5.97,7.08],
        backgroundColor: '#4CAF5066', borderColor: '#4CAF50', borderWidth: 2, borderRadius: 4 }
    ]
  },
  options: {
    plugins: { legend: { position: 'bottom' } },
    scales: { y: { ticks: { callback: v => v+'%' } },
      x: { ticks: { font: { size: 11 } } }
    }
  }
});
</script>
</body>
</html>
