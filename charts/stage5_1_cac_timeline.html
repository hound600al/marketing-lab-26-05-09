<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>5-1단계 — 지역 확장: CAC 타임라인</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f8f9fa; margin: 0; padding: 24px; }
  h2 { color: #1a1a2e; font-size: 18px; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top: 0; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; max-width: 960px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card h3 { font-size: 14px; color: #555; margin: 0 0 16px; }
  .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; margin-top: 10px; }
  .kpi-row { display: flex; flex-direction: column; gap: 12px; }
  .kpi { border-radius: 10px; padding: 14px; text-align: center; }
  .kpi .num { font-size: 22px; font-weight: 900; }
  .kpi .label { font-size: 12px; color: #666; margin-top: 4px; }
  canvas { max-height: 300px; }
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto">
  <h2>🗺️ 5-1단계 — 지역 확장: CAC 32% 절감 & 매출 정점 도달(예측)</h2>
  <p class="sub">서울 단독 운영 → 수도권 확장 | 광고 포화 돌파 전략</p>
  <div class="grid">
    <div class="card">
      <h3>📉 지역 확장에 따른 CAC 변화 타임라인</h3>
      <canvas id="cacChart"></canvas>
      <div class="badge">CAC 최고 19,250원 → 최저 12,553원 (-32%)</div>
    </div>
    <div class="card">
      <div class="kpi-row">
        <div class="kpi" style="background:#fff8e1">
          <div class="num" style="color:#e65100">19,250원</div>
          <div class="label">서울 포화 구간 CAC (24.11)</div>
        </div>
        <div class="kpi" style="background:#e8f5e9">
          <div class="num" style="color:#2e7d32">12,553원</div>
          <div class="label">확장 후 최저 CAC (25.03)</div>
        </div>
        <div class="kpi" style="background:#e3f2fd">
          <div class="num" style="color:#1565c0">약 5.2배</div>
          <div class="label">월 B2C 매출 성장(예측)</div>
        </div>
        <div class="kpi" style="background:#fce4ec">
          <div class="num" style="color:#880e4f">6.90%</div>
          <div class="label">사전 신청 유저 전환율<br>(기존 유저 0.90% 대비 7.7배)</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const labels = ['24.09\n서울','24.10\n서울','24.11\n서울','24.12\n서울','25.01\n성남확장','25.02\n하남·구리','25.03\n부천+6도시','25.06\n동탄 등','25.09\n평택 등'];
const cac = [11849,15735,19250,19056,14114,13223,12553,13197,14401];
const colors = cac.map(v => v <= 13000 ? '#4CAF50' : v >= 18000 ? '#ef5350' : '#FF9800');
new Chart(document.getElementById('cacChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: 'CAC (원)', data: cac,
      backgroundColor: colors.map(c => c+'66'), borderColor: colors, borderWidth: 2, borderRadius: 6
    }]
  },
  options: {
    plugins: { legend: { display: false } },
    scales: {
      y: { min: 10000, max: 22000, ticks: { callback: v => (v/10000).toFixed(1)+'만원' } },
      x: { ticks: { font: { size: 10 } } }
    }
  }
});
</script>
</body>
</html>
