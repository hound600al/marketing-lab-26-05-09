<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>swap 모빌리티 구독 그로스 전략 — 이도형</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --blue-50:#EEF3FF; --blue-100:#DCE6FF; --blue-500:#1E5BFF; --blue-600:#1547D6; --blue-700:#0F37A8;
  --ink-900:#0E1116; --ink-800:#1A1D24; --ink-700:#2A2F3A; --ink-500:#5A6172; --ink-300:#9AA1B2;
  --paper:#FFFFFF; --paper-2:#F6F8FC; --line:#E6EAF2;
  --mint-500:#12B886; --mint-50:#E6FAF3;
  --rose-500:#FF4D6A; --rose-50:#FFEDF0;
  --amber-500:#F59E0B; --amber-50:#FEF6E7;
  --r:16px; --shadow:0 1px 2px rgba(14,17,22,.04), 0 8px 24px rgba(14,17,22,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0c10;font-family:"Pretendard",-apple-system,sans-serif;color:var(--ink-800);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;overflow:hidden}
#scaler{width:1280px;height:720px;position:relative;transform-origin:center center}
.slide{position:absolute;inset:0;width:1280px;height:720px;background:var(--paper);
  display:none;flex-direction:column;padding:64px 80px;overflow:hidden}
.slide.active{display:flex}
.slide.dark{background:var(--ink-900);color:#fff}
.slide.tint{background:var(--paper-2)}

.kicker{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:.04em;
  color:var(--blue-600);text-transform:uppercase;margin-bottom:16px}
.kicker .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500)}
h1{font-size:62px;line-height:1.12;font-weight:800;letter-spacing:-.02em;color:var(--ink-900)}
h2{font-size:40px;line-height:1.18;font-weight:800;letter-spacing:-.02em;color:var(--ink-900)}
.sub{font-size:20px;line-height:1.5;color:var(--ink-500);font-weight:500}
.u-blue{color:var(--blue-500)} .u-mint{color:var(--mint-500)} .u-rose{color:var(--rose-500)} .u-amber{color:#B7791F}
.u-blue-mark{background:linear-gradient(transparent 58%, var(--blue-100) 58%);padding:0 4px}
.dark h1,.dark h2{color:#fff}.dark .sub{color:var(--ink-300)}

.row{display:flex;gap:22px}.col{flex:1}.grow{flex:1}.mt-a{margin-top:auto}
.cards{display:grid;gap:16px}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:repeat(3,1fr)}.c4{grid-template-columns:repeat(4,1fr)}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow)}
.card.tint{background:var(--paper-2);box-shadow:none}
.card.blue{background:var(--blue-50);border-color:var(--blue-100)}
.card.mint{background:var(--mint-50);border-color:#BFefdc}
.card.amber{background:var(--amber-50);border-color:#F6E3B8}
.card.ink{background:var(--ink-900);color:#fff;border:none}
.card h3{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:8px;color:var(--ink-900)}
.card.ink h3{color:#fff}
.card p{font-size:16px;line-height:1.55;color:var(--ink-500)}
.card.ink p{color:var(--ink-300)}
.tag{display:inline-block;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:999px;background:var(--blue-50);color:var(--blue-600);margin-bottom:10px}
.tag.mint{background:var(--mint-50);color:var(--mint-500)} .tag.rose{background:var(--rose-50);color:var(--rose-500)}
.tag.amber{background:var(--amber-50);color:#B7791F} .tag.ink{background:#232733;color:#fff}

.metric .big{font-size:46px;font-weight:800;letter-spacing:-.02em;color:var(--blue-500);line-height:1}
.metric .lbl{font-size:15px;color:var(--ink-500);margin-top:8px;font-weight:600}

ul.list{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:4px}
ul.list li{font-size:17px;line-height:1.5;color:var(--ink-700);padding-left:24px;position:relative}
ul.list li::before{content:"";position:absolute;left:0;top:8px;width:9px;height:9px;border-radius:3px;background:var(--blue-500)}
ul.list li b{color:var(--ink-900);font-weight:800}
.dark ul.list li{color:var(--ink-300)} .dark ul.list li b{color:#fff}

/* charts */
.chart{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-row .name{width:90px;font-size:14px;font-weight:700;color:var(--ink-700);text-align:right;flex:none;line-height:1.2}
.bar-track{flex:1;height:26px;background:var(--paper-2);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;background:var(--blue-500);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;color:#fff;font-size:13px;font-weight:800}
.bar-fill.mint{background:var(--mint-500)}.bar-fill.ink{background:var(--ink-700)}.bar-fill.b2{background:var(--blue-600)}
.chip{font-size:11.5px;font-weight:700;color:var(--ink-500);background:var(--paper-2);border:1px solid var(--line);padding:4px 9px;border-radius:999px}
.chip.on{background:var(--blue-500);color:#fff;border-color:var(--blue-500)}
.gbar{display:flex;height:23px;border-radius:7px;overflow:hidden;font-size:11.5px;font-weight:800;margin-bottom:13px}
.gbar .m{background:var(--blue-500);color:#fff;display:flex;align-items:center;padding-left:8px}
.gbar .f{background:#d3dbeb;color:var(--ink-500);display:flex;align-items:center;justify-content:center}
.lab{font-size:12px;font-weight:700;color:var(--ink-500);margin-bottom:5px}
.srch{background:#fff;border-bottom:1px solid var(--line);padding:11px 15px;display:flex;align-items:center;gap:9px}
.srch .nlogo{font-size:18px;font-weight:900;color:#03c75a}
.srch .q{flex:1;background:var(--paper-2);border:1.5px solid #03c75a;border-radius:8px;padding:7px 12px;font-size:14px;font-weight:700;color:var(--ink-800)}
.ad{border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.ad .src{font-size:11.5px;color:var(--ink-300);font-weight:700;margin-bottom:3px}
.ad .ttl{font-size:14.5px;font-weight:800;color:var(--ink-900);line-height:1.3}
.ad .ds{font-size:12.5px;color:var(--ink-500);margin-top:3px}

/* asset placeholder */
.ph{position:relative;border-radius:12px;overflow:hidden;background:var(--paper-2);border:1px dashed #C3CBDA;display:flex;align-items:center;justify-content:center}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top}
.ph .ph-label{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink-300);font-size:13px;font-weight:700;text-align:center;padding:12px}
.ph .ph-label .file{color:var(--blue-600);font-size:12px;background:var(--blue-50);padding:3px 8px;border-radius:6px}
.ph.ok{border-style:solid;border-color:var(--line)} .ph.ok .ph-label{display:none}

/* iframe embed */
.embed{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
.embed iframe{width:100%;height:100%;border:0;display:block;background:#fff}
.embed .bar{position:absolute;top:0;left:0;right:0;height:30px;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:7px;padding:0 12px;font-size:12px;font-weight:700;color:var(--ink-500);z-index:2}
.embed .bar .d{width:9px;height:9px;border-radius:50%;background:#ddd}
.embed .bar a{margin-left:auto;color:var(--blue-600);text-decoration:none;font-weight:800}
.embed .frame{position:absolute;top:30px;left:0;right:0;bottom:0}
.embed .frame iframe{height:100%}

.divider{height:1px;background:var(--line);margin:14px 0}.dark .divider{background:#232733}
.note{font-size:13px;color:var(--ink-300);line-height:1.5}
.flag{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#B7791F;background:var(--amber-50);border:1px solid #F6E3B8;padding:8px 14px;border-radius:10px;line-height:1.4}
.big-quote{font-size:29px;line-height:1.5;font-weight:700;letter-spacing:-.01em}
.big-quote .u-blue-mark{background:linear-gradient(transparent 58%, rgba(30,91,255,.30) 58%)}
.hero-badge{display:inline-flex;gap:10px;align-items:center;background:#171b22;border:1px solid #262b36;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:700;color:#cdd3e0;margin-bottom:24px}
.swap-logo{font-size:22px;font-weight:800;letter-spacing:-.02em;color:#fff}.swap-logo span{color:var(--blue-500)}
.arrow{font-size:28px;color:var(--blue-500);font-weight:800;align-self:center}

.foot{position:absolute;left:80px;right:80px;bottom:26px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--ink-300);font-weight:600}
.dark .foot{color:#4a5160}
.brand-foot{font-weight:800;color:var(--ink-700)}.dark .brand-foot{color:#9aa1b2}
#dots{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50}
#dots button{width:8px;height:8px;border-radius:50%;border:none;background:#3a4150;cursor:pointer;padding:0;transition:.2s}
#dots button.on{background:var(--blue-500);width:22px;border-radius:5px}
.help{position:fixed;bottom:13px;right:16px;color:#3a4150;font-size:12px;z-index:50}
.pageno{position:fixed;bottom:13px;left:16px;color:#3a4150;font-size:12px;font-weight:700;z-index:50}
</style>
</head>
<body>
<div id="scaler"></div>
<div id="dots"></div>
<div class="pageno" id="pageno"></div>
<div class="help">← → 또는 스페이스로 이동</div>

<script>
const SLIDES = [];
function S(html, cls=""){ SLIDES.push(`<section class="slide ${cls}">${html}<div class="foot"><span class="brand-foot">swap × 이도형 그로스 전략</span><span>2026.06</span></div></section>`); }
// asset placeholder helper
function A(file, label, h){ return `<div class="ph" style="height:${h}"><img src="assets/${file}" onerror="this.style.display='none'" onload="this.parentNode.classList.add('ok')"><span class="ph-label">🖼️ ${label}<span class="file">assets/${file}</span></span></div>`; }
// keyword stat card (gender + age) — Naver 키워드도구 데이터
function KW(name, trend, male, ages){ const fem=100-male;
  const arows=ages.map(([lbl,pct,cls])=>`<div class="bar-row"><span class="name" style="width:40px;font-size:12px">${lbl}</span><div class="bar-track" style="height:17px"><div class="bar-fill ${cls}" style="width:${Math.max(18,Math.round(pct/35*100))}%;font-size:10.5px;padding-right:7px">${pct}%</div></div></div>`).join('');
  return `<div class="col card" style="padding:16px 16px"><div style="font-size:17px;font-weight:800;color:var(--ink-900)">${name}</div><div class="note" style="margin-bottom:11px">${trend}</div><div class="lab">성별</div><div class="gbar"><div class="m" style="width:${male}%">남 ${male}%</div><div class="f" style="width:${fem}%">여 ${fem}%</div></div><div class="lab">연령대</div><div class="chart" style="gap:6px">${arows}</div></div>`; }
// embed helper
function E(url, title, h){ return `<div class="embed" style="height:${h}"><div class="bar"><span class="d" style="background:#ff5f57"></span><span class="d" style="background:#febc2e"></span><span class="d" style="background:#28c840"></span>${title}<a href="${url}" target="_blank">새 탭 ↗</a></div><div class="frame"><iframe src="${url}" loading="lazy" referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div></div>`; }

/* 1 TITLE */
SLIDES.push(`<section class="slide dark">
  <div class="hero-badge"><span class="swap-logo">s<span>wap</span></span> · 모빌리티 구독 D2C</div>
  <div class="kicker"><span class="dot"></span>Growth Strategy · 면접 발표</div>
  <h1>이륜 모빌리티 구독,<br><span class="u-blue">'배달'</span>이라는 답을 찾다</h1>
  <p class="sub" style="margin-top:22px;max-width:880px">검색 데이터가 가리키는 하나의 가설 —<br>전기자전거와 오토바이를 <b style="color:#fff">'배달용'</b> 니즈로 묶어 폭발적으로 모객한다.</p>
  <div style="margin-top:auto;display:flex;gap:12px;align-items:center;color:#9aa1b2;font-size:15px;font-weight:600">
    <span>이도형 · Growth Marketer</span><span style="opacity:.4">|</span><span>월 매출 40배 성장(예측)</span><span style="opacity:.4">|</span><span>월 광고 4.5억 / 5채널</span>
  </div>
</section>`);

/* 2 시장 */
S(`<div class="kicker"><span class="dot"></span>현황 진단 · Market</div>
  <h2>D2C 모빌리티 시장은 <span class="u-blue-mark">세 조각으로 단절</span>돼 있다</h2>
  <p class="sub" style="margin:12px 0 22px">판매 · 구독 · 인증중고를 한 브랜드로 잇는 플레이어는 사실상 없다.</p>
  <div class="cards c3 grow">
    <div class="card"><span class="tag ink">판매</span><h3>삼천리 · 알톤</h3><p>제조·판매 중심. 저가 e-bike로 진입장벽은 낮췄으나 '팔고 끝'.</p></div>
    <div class="card"><span class="tag">구독</span><h3>더스윙 SWAP · 모토벨로</h3><p>월정액·인수형 구독. 아직 초기 단계, 레저 포지셔닝 중심.</p></div>
    <div class="card"><span class="tag mint">인증중고</span><h3>라이트브라더스</h3><p>X-ray 검수+보증. 단 <b>프리미엄 카본만</b> — 생활형 e-bike는 공백.</p></div>
  </div>
  <div class="card blue" style="margin-top:18px"><p style="font-size:17px;color:var(--ink-800)"><b>핵심 공백</b> — 자동차의 인증중고·구독·정비망·매입 4종 신뢰 인프라가 자전거엔 모두 미성숙.</p></div>`);

/* 3 페인 */
S(`<div class="kicker"><span class="dot"></span>문제 정의 · Pain</div>
  <h2>고객은 <span class="u-blue">전 생애주기</span>에서 헤맨다</h2>
  <div class="cards c4 grow" style="margin-top:22px">
    <div class="card tint"><div class="metric"><div class="big">100만+</div><div class="lbl">구매 진입장벽<br>(목돈·정보비대칭·시승 불가)</div></div></div>
    <div class="card tint"><div class="metric"><div class="big u-rose">A/S</div><div class="lbl">"AS 가능한 곳 없으니<br>알아서 찾아가라"</div></div></div>
    <div class="card tint"><div class="metric"><div class="big u-rose">도난</div><div class="lbl">번호판·등록 부재<br>회수·보상 불가</div></div></div>
    <div class="card tint"><div class="metric"><div class="big u-rose">처분</div><div class="lbl">감가·사기·시세 부재<br>중고거래 리스크</div></div></div>
  </div>
  <div class="card ink" style="margin-top:20px"><p style="font-size:18px">"사기 전엔 뭘 살지 모르고 → 사면 고치기 힘들고 → 잃어버려도 보상 없고 → 팔 땐 헐값" — 고관여·저신뢰 내구재.</p></div>`);

/* 4 데이터1 — 네이버 스크린샷 */
S(`<div class="kicker"><span class="dot"></span>핵심 발견 · Data ①</div>
  <h2><span class="u-blue-mark">전기자전거 = 배달 라이더</span>, 같은 사람이다</h2>
  <p class="sub" style="margin:10px 0 16px">네이버 검색광고 키워드도구 — 성별·연령이 거의 동일하다. (남 70~85% · 30~50대 집중)</p>
  <div class="row grow" style="gap:14px">
    ${KW('전기자전거','월 7만 → 18만 · 강한 계절성',79,[['40대',33,'b2'],['30대',29,''],['50+',25,'ink'],['~29',9,'ink']])}
    ${KW('배민커넥트','월 2.5만 → 1.3만',83,[['30대',34,'b2'],['40대',34,''],['50+',19,'ink'],['~29',9,'ink']])}
    ${KW('배달라이더','월 1천~1.7천 · 연중 유지',73,[['40대',35,'b2'],['30대',26,''],['50+',23,'ink'],['~29',11,'ink']])}
  </div>
  <p class="note" style="margin-top:12px">교집합 타깃 = <b style="color:var(--blue-600)">30~50대 남성</b> · 출처: 네이버 검색광고 키워드도구(최근 1년, 데스크탑·모바일 종합 근사치)</p>`);

/* 5 데이터2 — 검색의도 + 시즌 */
S(`<div class="kicker"><span class="dot"></span>핵심 발견 · Data ②</div>
  <h2>검색엔진도 이미 둘을 <span class="u-blue">묶어서</span> 보여준다</h2>
  <div class="row grow" style="margin-top:16px;gap:20px">
    <div class="col" style="flex:1.05">
      <div class="card" style="padding:0;overflow:hidden">
        <div class="srch"><span class="nlogo">N</span><div class="q">전기 자전거</div></div>
        <div style="display:flex;gap:14px;padding:9px 15px;font-size:12.5px;color:var(--ink-300);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden">통합 · 쇼핑 · 이미지 · 블로그 · 카페 · 지식iN · 동영상</div>
        <div style="padding:13px 15px;display:flex;flex-direction:column;gap:11px">
          <div class="ad"><div class="src">광고 · lycle.kr</div><div class="ttl">전기자전거 · 제휴카드 렌탈시 · 최대 120만원 할인</div><div class="ds">초기비용 0원 · 최대 48개월 렌탈</div>
            <div style="display:flex;gap:7px;margin-top:9px"><span class="chip">자토바이</span><span class="chip on">배달용 추천</span><span class="chip">접이식</span></div></div>
          <div class="ad"><div class="src">광고 · ventlerus.com</div><div class="ttl">배달라이더가 선정한 자토바이 넘버원</div><div class="ds">프리미엄 전기자전거 · 24개월 무이자 · 부담없는 48개월 인수형렌탈</div></div>
        </div>
      </div>
      <p class="note" style="margin-top:9px">네이버 '전기자전거' 검색 → <b style="color:var(--blue-600)">'배달용 추천'</b> 노출 + 경쟁사 배달 광고</p>
    </div>
    <div class="col" style="display:flex;flex-direction:column;gap:14px">
      <div class="card amber"><span class="tag amber">상업적 검증</span><h3>"배달용 전기자전거" 경쟁지수 98</h3><p>검색량은 작아도 광고주 입찰 최상위 = 전환가치 높은 교집합.</p></div>
      <div class="card blue"><span class="tag mint">시즌 헷지</span>
        <div class="chart" style="margin-top:6px">
          <div class="bar-row"><span class="name">e-bike 봄·여름</span><div class="bar-track"><div class="bar-fill b2" style="width:100%">피크 18만</div></div></div>
          <div class="bar-row"><span class="name">e-bike 겨울</span><div class="bar-track"><div class="bar-fill ink" style="width:39%">7만 ↓</div></div></div>

/* render */
const scaler=document.getElementById('scaler');scaler.innerHTML=SLIDES.join('');
const slides=[...document.querySelectorAll('.slide')];const dots=document.getElementById('dots');const pageno=document.getElementById('pageno');
let i=0;slides.forEach((_,n)=>{const b=document.createElement('button');b.onclick=()=>go(n);dots.appendChild(b);});
function go(n){i=Math.max(0,Math.min(slides.length-1,n));slides.forEach((s,k)=>s.classList.toggle('active',k===i));[...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i));pageno.textContent=`${String(i+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;}
function fit(){const s=Math.min(window.innerWidth/1280,window.innerHeight/720);scaler.style.transform=`scale(${s})`;}
window.addEventListener('resize',fit);
window.addEventListener('keydown',e=>{if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();go(i+1);}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(i-1);}if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1);});
fit();go(0);
