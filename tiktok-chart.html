<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 광고 성과 추이</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 20px; }
  .channel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px 16px; background: #F5F5F5; border-left: 4px solid #010101; border-radius: 0 8px 8px 0; }
  .channel-logo { width: 36px; height: 36px; background: #010101; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .channel-name { font-size: 15px; font-weight: 600; color: #010101; }
  .channel-period { font-size: 11px; color: #666; margin-top: 2px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .card { background: #f5f5f3; border-radius: 8px; padding: 12px 14px; }
  .card-label { font-size: 11px; color: #6b6b6b; margin-bottom: 3px; }
  .card-value { font-size: 20px; font-weight: 500; }
  .card-sub { font-size: 10px; color: #999; margin-top: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 11px; color: #6b6b6b; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .sw-bar  { width: 11px; height: 11px; border-radius: 2px; background: #85B7EB; display: inline-block; }
  .sw-line { width: 14px; height: 0; border-top: 2.5px solid #6B5CA5; display: inline-block; }
  .sw-dash { width: 14px; height: 0; border-top: 2.5px dashed #E04F6A; display: inline-block; }
  .sw-dot  { width: 14px; height: 0; border-top: 2px dotted #7C3AED; display: inline-block; }
  .sw-ev   { width: 1.5px; height: 13px; background: rgba(136,135,128,0.6); display: inline-block; }
  .leg-sep { width: 0.5px; height: 13px; background: #ddd; margin: 0 3px; display: inline-block; }
  .chart-wrap { position: relative; width: 100%; height: 320px; }
  @media (max-width: 600px) { .cards { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="channel-header">
  <div class="channel-logo">TT</div>
  <div>
    <div class="channel-name">TikTok 광고 월별 성과 추이</div>
    <div class="channel-period">2024.10 ~ 2026.04</div>
  </div>
</div>
<div class="cards">
  <div class="card"><div class="card-label">누적 광고비</div><div class="card-value">1.18억원</div><div class="card-sub">2024.10 ~ 2026.04</div></div>
  <div class="card"><div class="card-label">최고 월 앱설치</div><div class="card-value">2,359건</div><div class="card-sub">2025-09</div></div>
  <div class="card"><div class="card-label">최고 월 구매</div><div class="card-value">2,106건</div><div class="card-sub">2026-03</div></div>
  <div class="card"><div class="card-label">최저 구매 CPA</div><div class="card-value">4,454원</div><div class="card-sub">2026-02</div></div>
</div>
<div class="legend">
  <span class="legend-item"><span class="sw-bar"></span>광고비 (왼쪽 축)</span>
  <span class="legend-item"><span class="sw-line"></span>앱설치 (오른쪽 축)</span>
  <span class="legend-item"><span class="sw-dash"></span>회원가입 (오른쪽 축)</span>
  <span class="legend-item"><span class="sw-dot"></span>구매 CPA (원, 툴팁 확인)</span>
  <span class="leg-sep"></span>
  <span class="legend-item"><span class="sw-ev"></span>주요 이벤트</span>
</div>
<div class="chart-wrap">
  <canvas id="tc" role="img" aria-label="틱톡 광고 월별 성과 추이, 2024.10~2026.04"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const rows=[
  {m:'24-10',s:91,i:1,r:0,c:null},
  {m:'24-11',s:230,i:1594,r:705,c:62133},
  {m:'24-12',s:428,i:1002,r:645,c:20286},
  {m:'25-01',s:247,i:527,r:305,c:32468},
  {m:'25-02',s:16,i:25,r:15,c:2861},
  {m:'25-03',s:0,i:0,r:0,c:null},
  {m:'25-04',s:0,i:0,r:0,c:null},
  {m:'25-05',s:0,i:0,r:0,c:null},
  {m:'25-06',s:0,i:0,r:0,c:null},
  {m:'25-07',s:0,i:0,r:0,c:null},
  {m:'25-08',s:199,i:1214,r:752,c:5657},
  {m:'25-09',s:958,i:2359,r:1377,c:14086},
  {m:'25-10',s:705,i:1349,r:814,c:7348},
  {m:'25-11',s:1135,i:1330,r:755,c:9795},
  {m:'25-12',s:1442,i:1245,r:761,c:9052},
  {m:'26-01',s:1044,i:581,r:372,c:6634},
  {m:'26-02',s:716,i:663,r:392,c:4454},
  {m:'26-03',s:2016,i:1975,r:1185,c:9574},
  {m:'26-04',s:2553,i:1502,r:878,c:14119},
];
const annos={1:'정식 론칭',4:'운영 중단',10:'채널 재개'};
const vLinePlugin={id:'vl',afterDraw(chart){const{ctx,chartArea:ca,scales}=chart;Object.entries(annos).forEach(([i,lbl])=>{const x=scales.x.getPixelForValue(+i);ctx.save();ctx.strokeStyle='rgba(136,135,128,0.45)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(x,ca.top+20);ctx.lineTo(x,ca.bottom);ctx.stroke();ctx.font='10px sans-serif';ctx.fillStyle='rgba(100,100,100,0.85)';ctx.textAlign='center';ctx.fillText(lbl,x,ca.top+13);ctx.restore();});}};
new Chart(document.getElementById('tc'),{
  plugins:[vLinePlugin],
  data:{labels:rows.map(r=>r.m),datasets:[
    {type:'bar',label:'광고비 (만원)',data:rows.map(r=>r.s),backgroundColor:'#85B7EB',yAxisID:'yL',order:3,borderRadius:2},
    {type:'line',label:'앱설치',data:rows.map(r=>r.i),borderColor:'#6B5CA5',backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#6B5CA5',yAxisID:'yR',order:2,tension:0.3,spanGaps:false},
    {type:'line',label:'회원가입',data:rows.map(r=>r.r),borderColor:'#E04F6A',backgroundColor:'transparent',borderWidth:2.5,borderDash:[6,3],pointRadius:3,pointBackgroundColor:'#E04F6A',yAxisID:'yR',order:2,tension:0.3,spanGaps:false},
    {type:'line',label:'구매 CPA (원)',data:rows.map(r=>r.c),borderColor:'#7C3AED',backgroundColor:'transparent',borderWidth:2,borderDash:[2,2],pointRadius:2.5,pointBackgroundColor:'#7C3AED',yAxisID:'yCPA',order:1,tension:0.2,spanGaps:false}
  ]},
  options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(255,255,255,0.97)',borderColor:'rgba(0,0,0,0.08)',borderWidth:1,titleColor:'#1a1a1a',bodyColor:'#444',padding:10,
      callbacks:{title(i){return i[0].label;},label(ctx){const v=ctx.parsed.y;if(v===null||v===undefined)return null;
        if(ctx.dataset.label==='광고비 (만원)')return '광고비: '+Math.round(v).toLocaleString()+'만원';
        if(ctx.dataset.label==='앱설치')return '앱설치: '+Math.round(v).toLocaleString()+'건';
        if(ctx.dataset.label==='회원가입')return '회원가입: '+Math.round(v).toLocaleString()+'명';
        return '구매CPA: '+Math.round(v).toLocaleString()+'원';}}}},
    scales:{
      x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:9},color:'#888'}},
      yL:{type:'linear',position:'left',title:{display:true,text:'광고비 (만원)',font:{size:10},color:'#999'},ticks:{callback:v=>v>=10000?(v/10000).toFixed(1)+'억':v.toLocaleString()+'만',font:{size:9},color:'#888'},grid:{color:'rgba(0,0,0,0.05)'}},
      yR:{type:'linear',position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'앱설치·회원가입 (건/명)',font:{size:10},color:'#999'},ticks:{callback:v=>v.toLocaleString(),font:{size:9},color:'#888'}},
      yCPA:{type:'linear',position:'right',display:false}
    }
  }
});
</script>
</body>
</html>
