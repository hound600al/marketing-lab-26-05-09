<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Ads 성과 추이</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 24px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .card { background: #f5f5f3; border-radius: 8px; padding: 14px 16px; }
  .card-label { font-size: 12px; color: #6b6b6b; margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 500; }
  .card-sub { font-size: 11px; color: #999; margin-top: 3px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; font-size: 12px; color: #6b6b6b; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .swatch-bar { width: 12px; height: 12px; border-radius: 2px; background: #85B7EB; display: inline-block; }
  .swatch-line { width: 14px; height: 0; border-top: 2.5px solid #639922; display: inline-block; }
  .swatch-dashed { width: 14px; height: 0; border-top: 2.5px dashed #BA7517; display: inline-block; }
  .swatch-event { width: 1.5px; height: 14px; background: rgba(136,135,128,0.6); display: inline-block; }
  .legend-sep { width: 0.5px; height: 14px; background: #ddd; margin: 0 4px; display: inline-block; }
  .chart-wrap { position: relative; width: 100%; height: 340px; }
  @media (max-width: 500px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="cards">
  <div class="card">
    <div class="card-label">누적 광고비</div>
    <div class="card-value">2.2억원</div>
    <div class="card-sub">2024.07 ~ 2025.08</div>
  </div>
  <div class="card">
    <div class="card-label">최고 월 앱설치</div>
    <div class="card-value">19,098건</div>
    <div class="card-sub">2025-08</div>
  </div>
  <div class="card">
    <div class="card-label">최고 월 인앱액션</div>
    <div class="card-value">13,066건</div>
    <div class="card-sub">2025-08</div>
  </div>
</div>
<div class="legend">
  <span class="legend-item"><span class="swatch-bar"></span>광고비 (왼쪽 축)</span>
  <span class="legend-item"><span class="swatch-line"></span>앱설치 (오른쪽 축)</span>
  <span class="legend-item"><span class="swatch-dashed"></span>인앱액션 (오른쪽 축)</span>
  <span class="legend-sep"></span>
  <span class="legend-item"><span class="swatch-event"></span>주요 이벤트</span>
</div>
<div class="chart-wrap">
  <canvas id="gc" role="img" aria-label="구글애즈 월별 성과 추이 차트"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const rows=[{m:'24-07',s:78,i:287,a:156},{m:'24-08',s:11,i:8,a:1},{m:'24-09',s:1,i:12,a:5},{m:'24-10',s:574,i:2578,a:966},{m:'24-11',s:529,i:2592,a:879},{m:'24-12',s:1708,i:11217,a:3882},{m:'25-01',s:1260,i:4865,a:1943},{m:'25-02',s:1242,i:4150,a:1797},{m:'25-03',s:2126,i:8121,a:2613},{m:'25-04',s:988,i:2413,a:1281},{m:'25-05',s:1410,i:3676,a:1799},{m:'25-06',s:2588,i:9158,a:5280},{m:'25-07',s:5743,i:14090,a:7481},{m:'25-08',s:4410,i:19098,a:13066}];
const annos={2:'T-CAP 시작',5:'ACI 확장',12:'T-ROAS'};
const vLinePlugin={id:'vl',afterDraw(chart){const{ctx,chartArea:ca,scales}=chart;Object.entries(annos).forEach(([i,lbl])=>{const x=scales.x.getPixelForValue(+i);ctx.save();ctx.strokeStyle='rgba(136,135,128,0.45)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(x,ca.top+20);ctx.lineTo(x,ca.bottom);ctx.stroke();ctx.font='10px sans-serif';ctx.fillStyle='rgba(100,100,100,0.85)';ctx.textAlign='center';ctx.fillText(lbl,x,ca.top+13);ctx.restore();})}};
new Chart(document.getElementById('gc'),{plugins:[vLinePlugin],data:{labels:rows.map(r=>r.m),datasets:[{type:'bar',label:'광고비 (만원)',data:rows.map(r=>r.s),backgroundColor:'#85B7EB',yAxisID:'yL',order:2,borderRadius:2},{type:'line',label:'앱설치',data:rows.map(r=>r.i),borderColor:'#639922',backgroundColor:'transparent',borderWidth:2.5,pointRadius:3.5,pointBackgroundColor:'#639922',yAxisID:'yR',order:1,tension:0.3},{type:'line',label:'인앱액션',data:rows.map(r=>r.a),borderColor:'#BA7517',backgroundColor:'transparent',borderWidth:2.5,borderDash:[6,3],pointRadius:3.5,pointBackgroundColor:'#BA7517',yAxisID:'yR',order:1,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(255,255,255,0.95)',borderColor:'rgba(0,0,0,0.08)',borderWidth:1,titleColor:'#1a1a1a',bodyColor:'#444',callbacks:{title(i){return i[0].label;},label(ctx){const v=ctx.parsed.y;if(v===null||v===undefined)return null;if(ctx.dataset.label==='광고비 (만원)')return '광고비: '+Math.round(v).toLocaleString()+'만원';if(ctx.dataset.label==='앱설치')return '앱설치: '+Math.round(v).toLocaleString()+'건';return '인앱액션: '+Math.round(v).toLocaleString()+'건';}}}},scales:{x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:10},color:'#888'}},yL:{type:'linear',position:'left',title:{display:true,text:'광고비 (만원)',font:{size:11},color:'#999'},ticks:{callback:v=>v>=10000?(v/10000).toFixed(1)+'억':v.toLocaleString()+'만',font:{size:10},color:'#888'},grid:{color:'rgba(0,0,0,0.06)'}},yR:{type:'linear',position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'앱설치·인앱액션 (건)',font:{size:11},color:'#999'},ticks:{callback:v=>v.toLocaleString(),font:{size:10},color:'#888'}}}}});
</script>
</body>
</html>
