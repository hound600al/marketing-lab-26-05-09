<!DOCTYPE html>
<html lang="ko">

  <div style="font-size:11px; color:var(--fg-3); margin-top:14px; line-height:1.5;">본문 인라인 사용 금지 · 섹션 헤더와 6단계 인디케이터 전용. 데이터 카드/차트에는 절대 X.</div>
