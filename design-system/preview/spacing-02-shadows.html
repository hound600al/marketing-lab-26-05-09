<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">ELEVATION · HEYDEALER-STYLE SOFT</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;">
    <div style="background:#fff; height:80px; border-radius:12px; box-shadow: 0 1px 2px rgba(15,25,50,0.04); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--ink-700); font-weight:600;">XS</div>
    <div style="background:#fff; height:80px; border-radius:12px; box-shadow: 0 2px 6px rgba(15,25,50,0.06); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--ink-700); font-weight:600;">SM (CARD)</div>
    <div style="background:#fff; height:80px; border-radius:12px; box-shadow: 0 6px 18px rgba(15,25,50,0.08); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:var(--ink-700); font-weight:600;">MD</div>
    <div style="background:var(--blue-500); height:80px; border-radius:12px; box-shadow: 0 8px 24px rgba(45,91,255,0.22); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; color:#fff; font-weight:600;">BLUE</div>
  </div>
  <div style="font-size:12px; color:var(--fg-2); margin-top:14px; line-height:1.5;">강한 drop-shadow 금지 · 거의 안 보이는 흐림으로 종이 위에 떠있는 느낌만.</div>

</body>
</html>
