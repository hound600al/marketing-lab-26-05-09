<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">EYEBROW + HEADING (SIGNATURE)</div>

  <div style="margin-bottom:24px;">
    <div style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.16em; text-transform:uppercase; font-weight:600; color:var(--fg-3); display:inline-flex; align-items:center; gap:12px; margin-bottom:14px;">
      <span style="width:36px; height:2px; background:var(--blue-500);"></span>
      <b style="font-weight:700; color:var(--blue-500);">03 — 6-STEP GROWTH STORY</b>
    </div>
    <div style="font-family:var(--font-display); font-size:36px; font-weight:900; line-height:1.05; letter-spacing:-0.03em; color:var(--ink-800);">
      월 매출 <span style="color:var(--ink-300); font-weight:600; font-size:.7em;">4,520만 →</span> <span style="color:var(--blue-500);">17.6억</span>
    </div>
  </div>

  <div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-bottom:8px; letter-spacing:0.1em;">SIGNATURE EMPHASIS</div>
    <div style="font-size:18px; color:var(--ink-800); line-height:1.5;">
      <b>한 헤드라인에 단 한 단어만 강조</b> — 다른 모든 인접 텍스트는 검정. <span style="color:var(--blue-500); font-weight:700;">파란색 키워드</span>가 시선을 잡고, 검정 본문이 안정감을 줍니다.
    </div>
  </div>

</body>
</html>
