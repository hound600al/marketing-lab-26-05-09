<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">BUTTONS · CTAs</div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <button style="background:var(--blue-500); color:#fff; border:none; padding:14px 24px; border-radius:999px; font-family:var(--font-sans); font-size:15px; font-weight:700; box-shadow: 0 8px 24px rgba(45,91,255,0.22); cursor:pointer;">전체 포트폴리오 보기 →</button>
    <button style="background:#fff; color:var(--blue-500); border:2px solid var(--blue-500); padding:12px 22px; border-radius:999px; font-family:var(--font-sans); font-size:15px; font-weight:700; cursor:pointer;">메일 보내기</button>
    <button style="background:var(--ink-800); color:#fff; border:none; padding:14px 24px; border-radius:999px; font-family:var(--font-sans); font-size:15px; font-weight:700; cursor:pointer;">PDF 다운로드</button>
    <button style="background:transparent; color:var(--ink-600); border:1px solid var(--ink-200); padding:13px 20px; border-radius:999px; font-family:var(--font-sans); font-size:14px; font-weight:600; cursor:pointer;">취소</button>
  </div>
  <div style="display:flex; gap:8px; margin-top:18px; font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.06em;">
    <span>PRIMARY (BLUE)</span><span>·</span><span>SECONDARY (OUTLINE)</span><span>·</span><span>INK (CONTRAST)</span><span>·</span><span>GHOST</span>
  </div>

</body>
</html>
