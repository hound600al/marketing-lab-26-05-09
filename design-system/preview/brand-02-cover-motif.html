<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">COVER MOTIF · DARK + RADIAL GLOW</div>
  <div style="background:var(--ink-900); border-radius:16px; padding:28px 32px; position:relative; overflow:hidden;">
    <div style="position:absolute; right:-80px; top:-80px; width:300px; height:300px; background: radial-gradient(circle, rgba(45,91,255,0.45) 0%, transparent 60%); pointer-events:none;"></div>
    <div style="position:relative;">
      <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.2em; color:var(--blue-300); font-weight:700; margin-bottom:10px;">PORTFOLIO · 2026</div>
      <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:14px;">
        <div style="width:24px; height:3px; background: var(--blue-500);"></div>
        <div style="font-family:var(--font-mono); font-size:13px; letter-spacing:0.22em; color:var(--blue-300); font-weight:600;">LEE DOHYEONG</div>
      </div>
      <div style="font-family:var(--font-display); font-size:38px; font-weight:900; line-height:0.95; letter-spacing:-0.04em; color:#fff;">
        브랜드의 <span style="color:var(--blue-400);">성장을</span><br>가속화합니다.
      </div>
    </div>
  </div>

</body>
</html>
