<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">PRIMARY · BLUE · HEYDEALER-INSPIRED</div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;">
    
      <div>
        <div style="height:64px; background:#EEF3FF; border-radius:8px; border:1px solid var(--ink-100);"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">50</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#EEF3FF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#DCE5FF; border-radius:8px; border:1px solid var(--ink-100);"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">100</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#DCE5FF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#B8CCFF; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">200</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#B8CCFF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#8FAEFF; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">300</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#8FAEFF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#5C86FF; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">400</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#5C86FF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#2D5BFF; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">500</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#2D5BFF</div>
      </div>
    
      <div>
        <div style="height:64px; background:#1B45E0; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">600</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#1B45E0</div>
      </div>
    
      <div>
        <div style="height:64px; background:#1432B0; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">700</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#1432B0</div>
      </div>
    
      <div>
        <div style="height:64px; background:#0C2280; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">800</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#0C2280</div>
      </div>
    
      <div>
        <div style="height:64px; background:#061554; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">900</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#061554</div>
      </div>
    
  </div>
  <div style="display:flex; gap:8px; margin-top:14px; font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.06em;">
    <span style="background:var(--blue-50); color:var(--blue-700); padding:2px 8px; border-radius:4px;">50 / TINT BG</span>
    <span style="background:var(--blue-500); color:#fff; padding:2px 8px; border-radius:4px;">500 / PRIMARY</span>
    <span style="background:var(--blue-700); color:#fff; padding:2px 8px; border-radius:4px;">700 / HOVER</span>
  </div>

</body>
</html>
