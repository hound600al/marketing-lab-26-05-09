<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">CHIPS · TAGS · STAGE INDICATOR</div>

  <div style="margin-bottom:18px;">
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-bottom:8px; letter-spacing:0.1em;">STAGE CHIP</div>
    <span style="display:inline-flex; align-items:center; gap:12px; padding:10px 20px; border-radius:999px; background: var(--blue-500); color:#fff; font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase;">
      <span>STEP 03</span><span style="opacity:.7;">|</span><span style="font-size:18px;">🎲</span><span>멀티채널 확장</span>
    </span>
  </div>

  <div style="margin-bottom:18px;">
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-bottom:8px; letter-spacing:0.1em;">TINT TAG (LIGHT BG)</div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <span style="display:inline-flex; padding:8px 18px; border-radius:999px; background:var(--blue-50); color:var(--blue-600); font-weight:600; font-size:14px;">📱 모바일 등급 UI</span>
      <span style="display:inline-flex; padding:8px 18px; border-radius:999px; background:var(--blue-50); color:var(--blue-600); font-weight:600; font-size:14px;">🎁 프로모션 LP</span>
      <span style="display:inline-flex; padding:8px 18px; border-radius:999px; background:var(--blue-50); color:var(--blue-600); font-weight:600; font-size:14px;">📊 데이터 대시보드</span>
    </div>
  </div>

  <div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-bottom:8px; letter-spacing:0.1em;">DARK TAG (DARK BG)</div>
    <div style="background:var(--ink-900); padding:14px 16px; border-radius:12px; display:flex; gap:8px; flex-wrap:wrap;">
      <span style="padding:6px 14px; border-radius:999px; background:rgba(255,255,255,0.10); color:#fff; font-weight:600; font-size:13px; border:1px solid rgba(255,255,255,0.18);">#데이터드리븐</span>
      <span style="padding:6px 14px; border-radius:999px; background:rgba(255,255,255,0.10); color:#fff; font-weight:600; font-size:13px; border:1px solid rgba(255,255,255,0.18);">#그로스해킹</span>
      <span style="padding:6px 14px; border-radius:999px; background:rgba(255,255,255,0.10); color:#fff; font-weight:600; font-size:13px; border:1px solid rgba(255,255,255,0.18);">#실행력</span>
    </div>
  </div>

</body>
</html>
