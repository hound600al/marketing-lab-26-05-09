<!DOCTYPE html>
<html lang="ko">
<head>

<link rel="stylesheet" href="../colors_and_type.css">

</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">SELECTED WORKS · 커버링 (FIGMA)</div>

  </div>
  <div style="font-size:12px; color:var(--fg-2); margin-top:12px; line-height:1.5;">등급제 · 8kg 초과 할인 · 연말 청소결산 · Lucky Clover — 실제 커버링 브랜드 작업물 (전 단계 직접 실행).</div>
