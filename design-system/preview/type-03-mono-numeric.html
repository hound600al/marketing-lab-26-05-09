<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">MONO · JETBRAINS MONO · TABULAR NUMS</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; align-items:end;">
    <div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.1em;">METRIC</div>
      <div style="font-family:var(--font-display); font-size:48px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; color:var(--blue-500);">17.6<span style="font-size:.5em;">억</span></div>
    </div>
    <div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.1em;">EYEBROW</div>
      <div style="font-family:var(--font-mono); font-size:13px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-800);">STEP 03 · 멀티채널</div>
    </div>
    <div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.1em;">PAGE NUM</div>
      <div style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.14em; color:var(--ink-500);">P 04 / 14</div>
    </div>
    <div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.1em;">DATA ROW</div>
      <div style="font-family:var(--font-mono); font-size:14px; font-weight:600; color:var(--ink-800);">4,520만 → 17,600,000원</div>
    </div>
  </div>

</body>
</html>
