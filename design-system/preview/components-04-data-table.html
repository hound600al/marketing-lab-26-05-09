<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">DATA TABLE PATTERN</div>
  <div style="background:#fff; border:1px solid var(--ink-100); border-radius:12px; padding:8px 12px;">
    <table style="width:100%; border-collapse:collapse; font-size:13px;">
      <thead>
        <tr style="border-bottom:2px solid var(--ink-200);">
          <th style="text-align:left; padding:10px 12px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3); font-weight:600;">단계</th>
          <th style="text-align:left; padding:10px 12px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3); font-weight:600;">핵심 과제</th>
          <th style="text-align:left; padding:10px 12px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3); font-weight:600;">성과</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:1px solid var(--ink-100);">
          <td style="padding:12px; font-family:var(--font-mono); font-weight:700;">🎯 1</td>
          <td style="padding:12px;"><b style="color:var(--ink-800);">소구점 발굴</b></td>
          <td style="padding:12px; font-family:var(--font-mono); color:var(--mint-500); font-weight:600;">CPI –72.8%</td>
        </tr>
        <tr style="background:var(--blue-50); border-bottom:1px solid var(--ink-100);">
          <td style="padding:12px; font-family:var(--font-mono); font-weight:700; border-left:3px solid var(--blue-500);">🎲 3</td>
          <td style="padding:12px;"><b style="color:var(--ink-800);">멀티채널 확장</b></td>
          <td style="padding:12px; font-family:var(--font-mono); color:var(--mint-500); font-weight:600;">+230%</td>
        </tr>
        <tr>
          <td style="padding:12px; font-family:var(--font-mono); font-weight:700;">🤝 4</td>
          <td style="padding:12px;"><b style="color:var(--ink-800);">인플루언서 PA</b></td>
          <td style="padding:12px; font-family:var(--font-mono); color:var(--mint-500); font-weight:600;">CPA –66%</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
