<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">TYPE SCALE</div>
  <div style="display:grid; grid-template-columns: 88px 1fr; gap: 14px 18px; align-items:baseline;">
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">D-LG / 88</div>
    <div style="font-family:var(--font-display); font-size:48px; font-weight:900; line-height:1; letter-spacing:-0.03em;">월 매출 40배</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">H1 / 44</div>
    <div style="font-family:var(--font-display); font-size:32px; font-weight:700; letter-spacing:-0.02em;">결과를 만드는 마케터</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">H3 / 24</div>
    <div style="font-size:20px; font-weight:600;">소구점 발굴 — 진짜 페인 포인트</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">BODY / 16</div>
    <div style="font-size:15px; color:var(--fg-2); line-height:1.6;">1인 마케터로 시작해 5인 팀 리드로 성장했습니다.</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">CAPTION / 12</div>
    <div style="font-size:11px; color:var(--fg-3); line-height:1.5;">데이터 분석으로 가설을 검증합니다.</div>
  </div>

</body>
</html>
