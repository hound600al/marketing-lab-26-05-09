<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">SEMANTIC · GROWTH · PROMO · WARNING</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
    <div>
      <div style="background: var(--mint-500); height:72px; border-radius:8px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">MINT 500</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">#10C390 · 성장·성공</div>
      <div style="font-size:13px; color:var(--mint-500); font-weight:600; margin-top:4px;">+230% · LTV 18.1×</div>
    </div>
    <div>
      <div style="background: var(--sun-500); height:72px; border-radius:8px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">SUN 500</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">#F5B400 · 프로모·강조</div>
      <div style="font-size:13px; color:var(--sun-500); font-weight:600; margin-top:4px;">₩990 · 첫 이용 혜택</div>
    </div>
    <div>
      <div style="background: var(--rose-500); height:72px; border-radius:8px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">ROSE 500</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">#EF4444 · 손실·경고</div>
      <div style="font-size:13px; color:var(--rose-500); font-weight:600; margin-top:4px;">–66% · CPA 절감</div>
    </div>
  </div>

</body>
</html>
