<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">NEUTRAL · INK · TEXT & SURFACES</div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;">
    
      <div>
        <div style="height:64px; background:#F7F9FD; border-radius:8px; border:1px solid var(--ink-100);"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">50</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#F7F9FD</div>
      </div>
    
      <div>
        <div style="height:64px; background:#EEF1F6; border-radius:8px; border:1px solid var(--ink-100);"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">100</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#EEF1F6</div>
      </div>
    
      <div>
        <div style="height:64px; background:#DDE2EB; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">200</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#DDE2EB</div>
      </div>
    
      <div>
        <div style="height:64px; background:#B7BFCC; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">300</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#B7BFCC</div>
      </div>
    
      <div>
        <div style="height:64px; background:#8B95A6; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">400</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#8B95A6</div>
      </div>
    
      <div>
        <div style="height:64px; background:#5B6675; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">500</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#5B6675</div>
      </div>
    
      <div>
        <div style="height:64px; background:#3A4252; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">600</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#3A4252</div>
      </div>
    
      <div>
        <div style="height:64px; background:#1F2837; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">700</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#1F2837</div>
      </div>
    
      <div>
        <div style="height:64px; background:#131A26; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">800</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#131A26</div>
      </div>
    
      <div>
        <div style="height:64px; background:#0A0E16; border-radius:8px; border:none;"></div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3); margin-top:6px; font-weight:600;">900</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-4);">#0A0E16</div>
      </div>
    
  </div>
  <div style="display:flex; gap:8px; margin-top:14px; font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.06em;">
    <span style="background:var(--ink-50); padding:2px 8px; border-radius:4px;">50 / PAGE BG</span>
    <span style="background:var(--ink-100); padding:2px 8px; border-radius:4px;">100 / DIVIDER</span>
    <span style="background:var(--ink-800); color:#fff; padding:2px 8px; border-radius:4px;">800 / TEXT</span>
    <span style="background:var(--ink-900); color:#fff; padding:2px 8px; border-radius:4px;">900 / DARK BG</span>
  </div>

</body>
</html>
