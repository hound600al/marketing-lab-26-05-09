<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">COLOR IN USE · SIGNATURE HEADLINE</div>
  <div style="background:var(--ink-900); padding:24px 28px; border-radius:12px;">
    <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--blue-300); margin-bottom:10px;">PORTFOLIO · 2026</div>
    <div style="font-family:var(--font-display); font-size:34px; font-weight:900; line-height:1.05; letter-spacing:-0.03em; color:#fff;">
      직접 만든 콘텐츠로<br>
      <span style="color:var(--blue-400);">27억</span>을 만들었습니다.
    </div>
  </div>
  <div style="display:flex; gap:6px; margin-top:14px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em;">
    <span style="background:var(--ink-900); color:#fff; padding:3px 10px; border-radius:4px;">INK 900</span>
    <span style="background:var(--blue-400); color:#fff; padding:3px 10px; border-radius:4px;">BLUE 400 (강조)</span>
    <span style="background:#fff; border:1px solid var(--ink-200); padding:3px 10px; border-radius:4px;">WHITE</span>
  </div>

</body>
</html>
