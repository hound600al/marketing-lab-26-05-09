<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">CARD VARIANTS</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
    <div style="background:#fff; border-radius:16px; box-shadow: 0 2px 6px rgba(15,25,50,0.06); padding:16px 18px;">
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--blue-500); font-weight:700; letter-spacing:0.1em;">.CARD</div>
      <div style="font-size:14px; color:var(--fg-2); margin-top:4px;">기본 카드 · soft shadow</div>
    </div>
    <div style="background:#fff; border-radius:16px; border:1px solid var(--ink-100); padding:16px 18px;">
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--blue-500); font-weight:700; letter-spacing:0.1em;">.CARD-FLAT</div>
      <div style="font-size:14px; color:var(--fg-2); margin-top:4px;">평면 · 헤어라인 보더</div>
    </div>
    <div style="background:var(--blue-50); border-radius:16px; padding:16px 18px;">
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--blue-700); font-weight:700; letter-spacing:0.1em;">.CARD-TINT</div>
      <div style="font-size:14px; color:var(--blue-700); margin-top:4px;">블루 50 강조 인용</div>
    </div>
    <div style="background:var(--blue-500); border-radius:16px; padding:16px 18px;">
      <div style="font-family:var(--font-mono); font-size:10px; color:rgba(255,255,255,0.85); font-weight:700; letter-spacing:0.1em;">.CARD-BLUE</div>
      <div style="font-size:14px; color:#fff; margin-top:4px;">솔리드 CTA · 핵심 메시지</div>
    </div>
  </div>

</body>
</html>
