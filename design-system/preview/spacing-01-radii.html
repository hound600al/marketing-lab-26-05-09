<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:18px;">CORNER RADII</div>
  <div style="display:flex; gap:14px; align-items:flex-end;">
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:4px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">XS</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">4px</div>
      </div>
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:8px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">SM</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">8px</div>
      </div>
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:12px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">MD</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">12px</div>
      </div>
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:16px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">LG</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">16px</div>
      </div>
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:24px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">XL</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">24px</div>
      </div>
    
      <div style="text-align:center;">
        <div style="width:72px; height:72px; background:var(--blue-500); border-radius:32px;"></div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">2XL</div>
        <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">32px</div>
      </div>
    
    <div style="text-align:center;">
      <div style="width:72px; height:72px; background:var(--blue-500); border-radius:9999px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-800); font-weight:700; margin-top:8px;">PILL</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-3);">9999</div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--fg-2); margin-top:14px;"><b style="color:var(--blue-500);">LG / 16px</b> = 기본 카드 시그니처 반경. HeyDealer 스타일.</div>

</body>
</html>
