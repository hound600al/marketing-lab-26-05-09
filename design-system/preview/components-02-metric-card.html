<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-card); }
  body { padding: 24px 28px; font-family: var(--font-sans); color: var(--fg-1); }
</style>
</head>
<body>

  <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; color:var(--fg-3); text-transform:uppercase; margin-bottom:14px;">METRIC CARD PATTERN</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;">
    <div style="background:#fff; border-radius:16px; box-shadow: 0 2px 6px rgba(15,25,50,0.06); padding:20px 22px;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);">월 매출 성장</div>
      <div style="font-family:var(--font-display); font-size:44px; font-weight:900; line-height:1; letter-spacing:-0.03em; font-variant-numeric:tabular-nums; color:var(--mint-500); margin-top:6px;">+230<span style="font-size:.5em;">%</span></div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:8px;">+230% (예측)</div>
    </div>
    <div style="background:var(--ink-900); border-radius:16px; padding:20px 22px;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--blue-300);">앱 매출 배수</div>
      <div style="font-family:var(--font-display); font-size:44px; font-weight:900; line-height:1; letter-spacing:-0.03em; font-variant-numeric:tabular-nums; color:#fff; margin-top:6px;">40<span style="font-size:.5em; color:var(--blue-400);">×</span></div>
      <div style="font-size:12px; color:var(--ink-300); margin-top:8px;">24개월간</div>
    </div>
    <div style="background:var(--blue-500); border-radius:16px; padding:20px 22px;">
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.85);">CPA 절감</div>
      <div style="font-family:var(--font-display); font-size:44px; font-weight:900; line-height:1; letter-spacing:-0.03em; font-variant-numeric:tabular-nums; color:#fff; margin-top:6px;">–66<span style="font-size:.5em;">%</span></div>
      <div style="font-size:12px; color:rgba(255,255,255,0.85); margin-top:8px;">35k → 12k</div>
    </div>
  </div>

</body>
</html>
